<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TokenWatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0A0F1A;          /* app background            */
    --surface:#111826;     /* cards                     */
    --surface-2:#161F30;   /* raised / hover            */
    --line:#212C42;        /* hairline borders          */
    --line-soft:#1A2334;   /* subtle dividers           */
    --accent:#E8A317;      /* single accent (money)     */
    --green:#3FB98C;       /* haiku / cheap / good      */
    --amber:#E8A317;       /* sonnet / mid              */
    --red:#E5564B;         /* opus / overkill / high    */
    --text:#E6EDF7;        /* primary                   */
    --muted:#8494AC;       /* secondary                 */
    --faint:#5A6B85;       /* tertiary                  */
    --track:#0E1524;       /* meter/bar track           */
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'Inter',system-ui,-apple-system,sans-serif;
    --r:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);color:var(--text);background:var(--bg);
    min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
    padding:34px 16px;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(900px 480px at 82% -8%, #14203a 0%, transparent 60%);
  }

  .app{width:460px;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;overflow:hidden;box-shadow:0 20px 50px -24px rgba(0,0,0,.7)}

  /* header */
  header{display:flex;align-items:center;justify-content:space-between;
    padding:15px 18px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px}
  .mark{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);
    background:var(--surface-2);display:grid;place-items:center;
    font-family:var(--mono);font-weight:700;font-size:11px;color:var(--accent);letter-spacing:-.5px}
  .brand .name{font-size:14px;font-weight:600;letter-spacing:-.2px}
  .brand .sub{font-size:10.5px;color:var(--faint);margin-top:1px}

  .controls{display:flex;align-items:center;gap:8px}
  .seg{display:flex;background:var(--track);border:1px solid var(--line);border-radius:8px;padding:2px}
  .seg button{appearance:none;border:0;background:none;cursor:pointer;color:var(--muted);
    font-family:var(--sans);font-size:11px;font-weight:600;padding:4px 9px;border-radius:6px;transition:.15s}
  .seg button:hover{color:var(--text)}
  .seg button.on{background:var(--surface-2);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.3)}

  /* tabs */
  nav{display:flex;gap:4px;padding:4px 12px 0;border-bottom:1px solid var(--line)}
  .tab{appearance:none;background:none;border:0;cursor:pointer;color:var(--muted);
    font-size:12.5px;font-weight:500;padding:10px 12px;position:relative}
  .tab:hover{color:var(--text)}
  .tab.on{color:var(--text)}
  .tab.on::after{content:"";position:absolute;left:8px;right:8px;bottom:-1px;height:2px;background:var(--accent)}
  .tab:focus-visible{outline:2px solid var(--accent);outline-offset:-4px;border-radius:6px}

  .panel{padding:20px 18px;display:none}
  .panel.on{display:block}

  .label{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:600;
    letter-spacing:1.6px;text-transform:uppercase;color:var(--faint)}
  .label::after{content:"";flex:1;height:1px;background:var(--line-soft)}

  /* overview */
  .hero{margin:12px 0 2px}
  .hero .n{font-family:var(--mono);font-weight:700;font-size:42px;line-height:1;
    letter-spacing:-1px;font-variant-numeric:tabular-nums;color:var(--text)}
  .hero .n .cur{color:var(--accent)}
  .meter{margin:14px 0 5px;height:5px;background:var(--track);border-radius:3px;overflow:hidden;border:1px solid var(--line)}
  .meter i{display:block;height:100%;width:0;background:var(--accent);transition:width .8s cubic-bezier(.2,.8,.2,1);opacity:.9}
  .metafoot{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--faint)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
  .card{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px}
  .card .k{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--faint)}
  .card .v{font-family:var(--mono);font-weight:700;font-size:19px;margin-top:6px;font-variant-numeric:tabular-nums}

  .notice{margin-top:14px;display:flex;gap:10px;align-items:flex-start;
    background:rgba(229,86,75,.07);border:1px solid rgba(229,86,75,.28);border-radius:var(--r);padding:12px 13px}
  .notice .bar{width:3px;align-self:stretch;background:var(--red);border-radius:2px}
  .notice p{font-size:12px;line-height:1.5;color:var(--text)}
  .notice b{color:var(--red)}

  .bars{margin-top:12px;display:flex;flex-direction:column;gap:11px}
  .bar{display:grid;grid-template-columns:78px 1fr auto;align-items:center;gap:12px}
  .bar .nm{display:flex;align-items:center;gap:7px;font-size:12.5px}
  .dot{width:7px;height:7px;border-radius:50%}
  .dot.op{background:var(--red)} .dot.so{background:var(--amber)} .dot.ha{background:var(--green)}
  .bar .tk{height:6px;background:var(--track);border-radius:3px;overflow:hidden}
  .bar .tk i{display:block;height:100%;width:0;border-radius:3px;transition:width .8s cubic-bezier(.2,.8,.2,1)}
  .fill.op{background:var(--red)} .fill.so{background:var(--amber)} .fill.ha{background:var(--green)}
  .bar .amt{font-family:var(--mono);font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

  /* history table (collapsible rows) */
  .cols{grid-template-columns:15px 70px 1fr 78px 72px}
  .thead{display:grid;gap:10px;align-items:center;font-size:10px;letter-spacing:.6px;
    text-transform:uppercase;color:var(--faint);padding:0 2px 8px;border-bottom:1px solid var(--line)}
  .thead .r{text-align:right}
  .tbody{max-height:356px;overflow:auto;margin-top:2px}
  .tbody::-webkit-scrollbar{width:8px}
  .tbody::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
  .trow{border-bottom:1px solid var(--line-soft);position:relative}
  .trow.over::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:2px;background:var(--red);border-radius:2px}
  .tsum{display:grid;gap:10px;align-items:center;width:100%;text-align:left;cursor:pointer;
    appearance:none;background:none;border:0;color:var(--text);padding:9px 2px 9px 4px;font-size:12px}
  .tsum:hover{background:var(--surface-2)}
  .tsum .caret{color:var(--faint);font-size:9px;transition:transform .15s}
  .trow.open .tsum .caret{transform:rotate(90deg)}
  .tsum .when{font-family:var(--mono);color:var(--faint);font-size:11px}
  .tsum .mdl{display:flex;align-items:center;gap:7px;min-width:0}
  .tsum .mdl .t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tsum .tok,.tsum .cost{font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right;font-size:11.5px}
  .tsum .cost{color:var(--text)} .trow.over .tsum .cost{color:var(--red)}
  .tdetail{display:none;padding:4px 10px 13px 21px}
  .trow.open .tdetail{display:block}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:11.5px;margin-top:6px}
  .kv .k{color:var(--faint)}
  .kv .v{font-family:var(--mono);font-variant-numeric:tabular-nums;word-break:break-all}
  .tdetail .flag{color:var(--red);font-size:11px;margin-top:8px}
  .tdetail .task{margin-top:8px;padding:8px 10px;background:var(--track);border:1px solid var(--line);
    border-radius:8px;font-size:11.5px;color:#BFCADC;line-height:1.5}

  /* advisor */
  .lead{font-size:12.5px;color:var(--muted);line-height:1.55;margin:8px 0 13px}
  textarea{width:100%;height:96px;resize:none;background:var(--track);border:1px solid var(--line);
    border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:11px 12px;line-height:1.45}
  textarea::placeholder{color:var(--faint)}
  textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,163,23,.13)}
  .btn{margin-top:11px;appearance:none;border:0;cursor:pointer;width:100%;padding:11px;border-radius:var(--r);
    font-family:var(--sans);font-weight:600;font-size:13px;color:#231705;background:var(--accent);transition:.13s}
  .btn:hover{filter:brightness(1.05)} .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.5;cursor:default;transform:none}

  .loading{display:none;align-items:center;gap:9px;margin-top:15px;font-size:12.5px;color:var(--muted)}
  .loading.on{display:flex}
  .spin{width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}

  .verdict{display:none;margin-top:16px}
  .verdict.on{display:block}
  .vhead{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;
    padding:5px 11px;border-radius:8px;border:1px solid var(--line)}
  .chip .dot{width:7px;height:7px;border-radius:50%}
  .chip.haiku .dot{background:var(--green)} .chip.sonnet .dot{background:var(--amber)} .chip.opus .dot{background:var(--red)}
  .vhead .est{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .situation{font-size:15px;font-weight:600;margin-bottom:4px}
  .why{font-size:12.5px;line-height:1.55;color:#BFCADC}
  .metrics{display:flex;gap:16px;font-family:var(--mono);font-size:10.5px;color:var(--faint);margin:11px 0;flex-wrap:wrap}
  .metrics b{color:var(--green);font-weight:600}
  .cmd{position:relative;background:var(--track);border:1px solid var(--line);border-radius:var(--r);
    padding:12px 46px 12px 12px;font-family:var(--mono);font-size:11.5px;color:#BFD4F5;word-break:break-all;line-height:1.5}
  .copy{position:absolute;top:8px;right:8px;appearance:none;border:1px solid var(--line);cursor:pointer;
    background:var(--surface-2);color:var(--muted);border-radius:7px;font-size:10.5px;padding:5px 8px;font-family:var(--mono)}
  .copy:hover{color:var(--text)}
  .empty{color:var(--faint);font-size:12px;text-align:center;padding:30px 0}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="mark">TW</div>
        <div>
          <div class="name">TokenWatch</div>
          <div class="sub" data-i="tagline">AI spend tracker</div>
        </div>
      </div>
      <div class="controls">
        <div class="seg" id="langSeg">
          <button data-v="en">EN</button><button data-v="uk">UK</button>
        </div>
        <div class="seg" id="curSeg">
          <button data-v="usd">$</button><button data-v="uah">₴</button>
        </div>
      </div>
    </header>

    <nav>
      <button class="tab on" data-tab="overview" data-i="tab_overview">Overview</button>
      <button class="tab" data-tab="history" data-i="tab_history">History</button>
      <button class="tab" data-tab="advisor" data-i="tab_advisor">Advisor</button>
    </nav>

    <!-- OVERVIEW -->
    <section class="panel on" data-panel="overview">
      <div class="label" data-i="month_to_date">Month to date</div>
      <div class="hero"><div class="n" id="odo">—</div></div>
      <div class="meter"><i id="meterFill"></i></div>
      <div class="metafoot"><span data-i="meter_run">accruing this month</span><span id="meterPct"></span></div>

      <div class="grid2">
        <div class="card"><div class="k" data-i="all_time">All-time spend</div><div class="v" id="allTime">—</div></div>
        <div class="card"><div class="k" data-i="requests">Requests</div><div class="v" id="reqCount">—</div></div>
      </div>

      <div class="notice" id="notice" style="display:none">
        <span class="bar"></span><p id="noticeMsg"></p>
      </div>

      <div class="label" style="margin-top:20px" data-i="by_model">Spend by model</div>
      <div class="bars" id="bars"></div>
    </section>

    <!-- HISTORY -->
    <section class="panel" data-panel="history">
      <div class="thead cols">
        <span></span>
        <span data-i="col_time">Time</span>
        <span data-i="col_model">Model</span>
        <span class="r" data-i="col_tokens">Tokens</span>
        <span class="r" data-i="col_cost">Cost</span>
      </div>
      <div class="tbody" id="tbody"></div>
    </section>

    <!-- ADVISOR -->
    <section class="panel" data-panel="advisor">
      <div class="label" data-i="advisor_title">Model advisor</div>
      <p class="lead" data-i="advisor_lead"></p>
      <textarea id="prompt"></textarea>
      <button class="btn" id="recommend" data-i="analyze">Analyze &amp; recommend</button>
      <div class="loading" id="loading"><span class="spin"></span> <span data-i="analyzing">Claude Haiku is analyzing the task…</span></div>
      <div class="verdict" id="verdict">
        <div class="vhead">
          <span class="chip" id="chip"><span class="dot"></span><span id="chipName"></span></span>
          <span class="est" id="est"></span>
        </div>
        <div class="situation" id="situation"></div>
        <div class="why" id="why"></div>
        <div class="metrics">
          <span id="via"></span>
          <span><span data-i="confidence">confidence</span> <b id="conf"></b></span>
          <span><span data-i="saves">saves</span> <b id="save"></b> <span data-i="vs_opus">vs Opus</span></span>
        </div>
        <div class="cmd"><button class="copy" id="copy" data-i="copy">copy</button><span id="cmdText"></span></div>
      </div>
    </section>
  </div>

<script>
/* ---------------- settings ---------------- */
const UAH_PER_USD = 41.5;               // editable FX rate (UAH per 1 USD)
let lang = localStorage.getItem("tw_lang") || "en";
let cur  = localStorage.getItem("tw_cur")  || "usd";
let last = null;                        // last /api/data payload

const I18N = {
  en:{
    tagline:"AI spend tracker",
    tab_overview:"Overview", tab_history:"History", tab_advisor:"Advisor",
    month_to_date:"Month to date", meter_run:"accruing this month",
    all_time:"All-time spend", requests:"Requests", by_model:"Spend by model",
    col_time:"Time", col_model:"Model", col_tokens:"Tokens", col_cost:"Cost",
    of_all_time:"of all-time", empty:"No requests found yet.",
    overkill:(amt,n)=>`You overpaid <b>${amt}</b> on ${n} simple task${n==1?"":"s"} — Haiku would have covered them.`,
    overkill_flag:(amt)=>`overkill — Haiku saves ${amt}`,
    advisor_title:"Model advisor",
    advisor_lead:"Describe your task. TokenWatch asks Claude Haiku to read it and pick the cheapest model that can handle the situation — then hands you the command.",
    placeholder:"e.g. our checkout total is occasionally wrong; find out why\nor: rename a variable across the file",
    analyze:"Analyze & recommend", analyzing:"Claude Haiku is analyzing the task…",
    confidence:"confidence", saves:"saves", vs_opus:"vs Opus", copy:"copy", copied:"copied ✓",
    for_task:"for this task", via_haiku:"analyzed by Claude Haiku", via_offline:"offline heuristic",
    analysis_failed:"Analysis failed"
  },
  uk:{
    tagline:"облік витрат на ШІ",
    tab_overview:"Огляд", tab_history:"Історія", tab_advisor:"Порадник",
    month_to_date:"За поточний місяць", meter_run:"накопичується цього місяця",
    all_time:"Витрати за весь час", requests:"Запити", by_model:"Витрати за моделями",
    col_time:"Час", col_model:"Модель", col_tokens:"Токени", col_cost:"Вартість",
    of_all_time:"від усього часу", empty:"Запитів поки не знайдено.",
    overkill:(amt,n)=>`Ви переплатили <b>${amt}</b> на ${n} прост${n==1?"ій задачі":"их задачах"} — вистачило б Haiku.`,
    overkill_flag:(amt)=>`перевитрата — Haiku зекономив би ${amt}`,
    advisor_title:"Порадник моделі",
    advisor_lead:"Опишіть задачу. TokenWatch попросить Claude Haiku прочитати її й обрати найдешевшу модель, що впорається із ситуацією — і дасть готову команду.",
    placeholder:"напр. підсумок у кошику інколи невірний; з’ясуй чому\nабо: переймену­вати змінну у файлі",
    analyze:"Проаналізувати", analyzing:"Claude Haiku аналізує задачу…",
    confidence:"впевненість", saves:"економія", vs_opus:"проти Opus", copy:"копіювати", copied:"скопійовано ✓",
    for_task:"на цю задачу", via_haiku:"проаналізовано Claude Haiku", via_offline:"офлайн-евристика",
    analysis_failed:"Помилка аналізу"
  }
};
const t = k => I18N[lang][k];

function money(usdValue, precise=false){
  const value = cur === "uah" ? usdValue * UAH_PER_USD : usdValue;
  const locale = lang === "uk" ? "uk-UA" : "en-US";
  const digits = precise ? 4 : 2;
  return new Intl.NumberFormat(locale, {
    style:"currency", currency: cur === "uah" ? "UAH" : "USD",
    minimumFractionDigits:digits, maximumFractionDigits:digits
  }).format(value);
}
const num = n => new Intl.NumberFormat(lang==="uk"?"uk-UA":"en-US").format(n);

/* ---------------- static i18n ---------------- */
function applyStaticI18n(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i]").forEach(el=>{
    const v = I18N[lang][el.dataset.i];
    if(typeof v === "string") el.textContent = v;
  });
  $("#prompt").placeholder = t("placeholder");
  document.querySelectorAll("#langSeg button").forEach(b=>b.classList.toggle("on", b.dataset.v===lang));
  document.querySelectorAll("#curSeg button").forEach(b=>b.classList.toggle("on", b.dataset.v===cur));
}

/* ---------------- rendering ---------------- */
const $ = s => document.querySelector(s);
const clsFor = s => s==="Opus"?"op":s==="Sonnet"?"so":s==="Haiku"?"ha":"so";

function render(d){
  if(!d) return;
  // hero with colored currency symbol
  const full = money(d.monthToDate);
  $("#odo").textContent = full;
  $("#allTime").textContent = money(d.allTime);
  $("#reqCount").textContent = num(d.requestCount);

  const pct = d.allTime>0 ? Math.max(3, Math.round(d.monthToDate/d.allTime*100)) : 0;
  requestAnimationFrame(()=>$("#meterFill").style.width = pct+"%");
  $("#meterPct").textContent = pct+"% "+t("of_all_time");

  if(d.overpay > 0.0001){
    $("#notice").style.display="flex";
    $("#noticeMsg").innerHTML = t("overkill")(money(d.overpay, true), d.overkillCount);
  } else $("#notice").style.display="none";

  const max = Math.max(...d.byModel.map(m=>m.cost), 1e-9);
  $("#bars").innerHTML = d.byModel.map(m=>{
    const c = clsFor(m.short);
    return `<div class="bar">
      <span class="nm"><span class="dot ${c}"></span>${m.short}</span>
      <span class="tk"><i class="fill ${c}" data-w="${Math.max(3,Math.round(m.cost/max*100))}"></i></span>
      <span class="amt">${money(m.cost, true)}</span>
    </div>`;}).join("");
  requestAnimationFrame(()=>document.querySelectorAll(".tk i").forEach(i=>i.style.width=i.dataset.w+"%"));

  $("#tbody").innerHTML = d.history.length ? d.history.map(h=>{
    const c = clsFor(h.short);
    const kv = (k,v)=>`<span class="k">${k}</span><span class="v">${v}</span>`;
    return `<div class="trow ${h.overkill?"over":""}">
      <button class="tsum cols">
        <span class="caret">▶</span>
        <span class="when">${h.when}</span>
        <span class="mdl"><span class="dot ${c}"></span><span class="t">${h.short}</span></span>
        <span class="tok r">${num(h.inTok)}→${num(h.outTok)}</span>
        <span class="cost r">${money(h.cost, true)}</span>
      </button>
      <div class="tdetail">
        <div class="kv">
          ${kv(t("col_model"), esc(h.model))}
          ${kv(t("col_tokens"), `in ${num(h.inTok)} · out ${num(h.outTok)} · cache r ${num(h.cacheRead)} · cache w ${num(h.cacheWrite)}`)}
          ${kv(t("col_cost"), money(h.cost, true))}
          ${kv("Project", esc(h.project||"—"))}
        </div>
        ${h.preview?`<div class="task">${esc(h.preview)}</div>`:""}
        ${h.overkill?`<div class="flag">${t("overkill_flag")(money(h.overpay,true))}</div>`:""}
      </div>
    </div>`;}).join("") : `<div class="empty">${t("empty")}</div>`;
}
function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------------- interactions ---------------- */
document.querySelectorAll(".tab").forEach(tb=>tb.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  tb.classList.add("on");
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("on", p.dataset.panel===tb.dataset.tab));
}));
$("#langSeg").addEventListener("click",e=>{ const v=e.target.dataset.v; if(!v)return;
  lang=v; localStorage.setItem("tw_lang",v); applyStaticI18n(); render(last); refreshVerdict(); });
$("#curSeg").addEventListener("click",e=>{ const v=e.target.dataset.v; if(!v)return;
  cur=v; localStorage.setItem("tw_cur",v); applyStaticI18n(); render(last); refreshVerdict(); });

/* history: expand/collapse rows (all collapsed by default) */
$("#tbody").addEventListener("click", e=>{
  const sum = e.target.closest(".tsum");
  if(sum) sum.parentElement.classList.toggle("open");
});

/* advisor */
let lastVerdict = null;
$("#recommend").addEventListener("click", async ()=>{
  const prompt = $("#prompt").value.trim();
  if(!prompt){ $("#prompt").focus(); return; }
  $("#verdict").classList.remove("on");
  $("#loading").classList.add("on");
  $("#recommend").disabled = true;
  try{
    const r = await fetch("/api/advise?prompt="+encodeURIComponent(prompt)).then(r=>r.json());
    lastVerdict = r; refreshVerdict();
    $("#verdict").classList.add("on");
  }catch(e){ $("#why").textContent = t("analysis_failed")+": "+e; $("#verdict").classList.add("on"); }
  finally{ $("#loading").classList.remove("on"); $("#recommend").disabled=false; }
});
function refreshVerdict(){
  const r = lastVerdict; if(!r) return;
  const names = {haiku:"Haiku", sonnet:"Sonnet", opus:"Opus"};
  $("#chip").className = "chip "+r.tier;
  $("#chipName").textContent = names[r.tier];
  $("#est").textContent = "≈ "+money(r.estimated_cost, true)+" "+t("for_task");
  $("#situation").textContent = r.situation || "";
  $("#why").textContent = r.reasoning || "";
  $("#via").textContent = (r.source==="haiku"? "🧠 "+t("via_haiku") : "⚙ "+t("via_offline"));
  $("#conf").textContent = Math.round((r.confidence||0)*100)+"%";
  $("#save").textContent = money(r.savings_vs_opus||0, true);
  $("#cmdText").textContent = r.command || "";
}
$("#copy").addEventListener("click",()=>{
  navigator.clipboard.writeText($("#cmdText").textContent);
  $("#copy").textContent=t("copied"); setTimeout(()=>$("#copy").textContent=t("copy"),1200);
});

/* ---------------- load ---------------- */
async function load(){ try{ last = await fetch("/api/data").then(r=>r.json()); render(last); }catch(e){ console.error(e); } }
applyStaticI18n();
load();
setInterval(load, 15000);
</script>
